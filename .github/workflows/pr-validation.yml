name: PR Validation

on:
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version_format: ${{ steps.set-version.outputs.version_format }}
    steps:
      - id: set-version
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          if [ "$BASE_BRANCH" == "main" ]; then
            VERSION_FORMAT="1.0.*"
          elif [ "$BASE_BRANCH" == "staging" ]; then
            VERSION_FORMAT="1.0.*-beta*"
          else
            VERSION_FORMAT="1.0.*-alpha*"
          fi
          echo "version_format=$VERSION_FORMAT" >> $GITHUB_OUTPUT

  build-and-test:
    needs: prep
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_build-and-test.yml
    with:
      solution_file: Maliev.MaterialService.slnx
      extra_args: -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}
    secrets:
      gitops_pat: ${{ secrets.GITOPS_PAT }}

  container:
    name: Build and scan production image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: maliev-material-service:pr-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build local production image in package mode
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Maliev.MaterialService.Api/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          secrets: |
            nuget_username=${{ github.actor }}
            nuget_password=${{ secrets.GITOPS_PAT }}
          cache-from: type=gha,scope=material-pr-containe
          cache-to: type=gha,mode=max,scope=material-pr-containe

      - name: Validate runtime image metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(docker image inspect "$IMAGE_TAG")"
          test "$(jq -r '.[0].Config.User' <<< "$metadata")" = "app"
          test "$(jq -c '.[0].Config.Entrypoint' <<< "$metadata")" = '["dotnet","Maliev.MaterialService.Api.dll"]'
          test "$(jq -r '.[0].Config.ExposedPorts | has("8080/tcp")' <<< "$metadata")" = "true"
          test "$(jq -r '.[0].Config.Healthcheck == null' <<< "$metadata")" = "true"

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: trivy-sbom.cdx.json
          scanners: vuln
          exit-code: "0"

      - name: Upload image SBOM evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: material-image-sbom-${{ github.run_id }}-${{ github.run_attempt }}
          path: trivy-sbom.cdx.json
          if-no-files-found: erro
          retention-days: 14

      - name: Scan image for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
