name: CI - Develop

on:
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_build-and-test.yml
    with:
      solution_file: Maliev.MaterialService.slnx
    secrets:
      gitops_pat: ${{ secrets.GITOPS_PAT }}

  publish-image:
    name: Publish immutable development image
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-dev/maliev-material-service
      BASE_IMAGE: asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact/maliev-material-service
      GITOPS_OVERLAY: 3-apps/maliev-material-service/overlays/development
      KUSTOMIZE_VERSION: v5.8.1
      KUSTOMIZE_SHA256: 029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d
    steps:
      - name: Require WIF publication configuration
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "$WIF_PROVIDER"
          test -n "$WIF_SERVICE_ACCOUNT"

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Derive immutable version
        id: version
        shell: bash
        run: echo "short_sha=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          project_id: maliev-website
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: maliev-website

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Maliev.MaterialService.Api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:dev-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          secrets: |
            nuget_username=${{ github.actor }}
            nuget_password=${{ secrets.GITOPS_PAT }}
          cache-from: type=gha,scope=material-develop-containe
          cache-to: type=gha,mode=max,scope=material-develop-containe
          provenance: mode=max
          sbom: true

      - name: Verify published digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAG: dev-${{ steps.version.outputs.short_sha }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          registry_digest="$(gcloud artifacts docker images describe "$IMAGE_NAME:$IMAGE_TAG" --format='value(image_summary.digest)')"
          test "$registry_digest" = "$IMAGE_DIGEST"

      - name: Generate build provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate image SBOM evidence
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: trivy-sbom.cdx.json
          scanners: vuln
          exit-code: "0"

      - name: Upload image SBOM evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: material-develop-sbom-${{ steps.version.outputs.short_sha }}
          path: trivy-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Scan published digest for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Checkout GitOps evidence repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/maliev-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: maliev-gitops

      - name: Install Kustomize
        shell: bash
        run: |
          set -euo pipefail
          archive="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          release_url="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}"
          curl --fail --location --silent --show-error "$release_url/$archive" --output "$RUNNER_TEMP/$archive"
          echo "$KUSTOMIZE_SHA256  $archive" > "$RUNNER_TEMP/kustomize.sha256"
          (cd "$RUNNER_TEMP" && sha256sum --check kustomize.sha256)
          tar --extract --gzip --file "$RUNNER_TEMP/$archive" --directory "$RUNNER_TEMP" kustomize
          sudo install --mode 0755 "$RUNNER_TEMP/kustomize" /usr/local/bin/kustomize
          kustomize version

      - name: Pin disabled development overlay to digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cd "maliev-gitops/$GITOPS_OVERLAY"
          kustomize edit set image "$BASE_IMAGE=$IMAGE_NAME@$IMAGE_DIGEST"
          kustomize build . >/dev/null
          cd ../../../..
          if grep -RIl "$GITOPS_OVERLAY" argocd/environments | grep -v '/_disabled_apps/'; then
            echo "Refusing evidence update because an active ArgoCD Application references MaterialService."
            exit 1
          fi
          changed="$(git diff --name-only)"
          expected="$GITOPS_OVERLAY/kustomization.yaml"
          if [[ -n "$changed" ]]; then
            test "$changed" = "$expected"
          fi

      - name: Create draft GitOps evidence PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          PR_BODY: >-
            Evidence only: pins the disabled MaterialService development overlay to
            $IMAGE_NAME@$IMAGE_DIGEST from source $GITHUB_SHA. Service applications remain
            intentionally disabled. Do not merge or register an application outside
            _disabled_apps until deployment readiness is explicitly approved.
        run: |
          set -euo pipefail
          cd maliev-gitops
          branch_name="material-service/dev-$SHORT_SHA-${GITHUB_RUN_ATTEMPT}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git switch -c "$branch_name"
          git add "$GITOPS_OVERLAY/kustomization.yaml"
          if git diff --staged --quiet; then
            echo "No GitOps evidence change required"
            exit 0
          fi
          git commit -m "chore(dev): record MaterialService digest $IMAGE_DIGEST"
          git push origin "$branch_name"
          gh pr create \
            --draft \
            --title "[DO NOT MERGE] chore(dev): update material-service evidence" \
            --body "$PR_BODY" \
            --base main \
            --head "$branch_name" \
            --repo MALIEV-Co-Ltd/maliev-gitops
