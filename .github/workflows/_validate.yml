name: Reusable Validation

on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.ci-nuget/packages
  SHARED_LIBRARY_VERSION: 1.0.96-alpha
  SERVICE_DEFAULTS_VERSION: 1.0.89-alpha

jobs:
  dependency-packages:
    name: Build exact public-source dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Checkout MaterialService source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout exact MessagingContracts source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MALIEV-Co-Ltd/Maliev.MessagingContracts
          ref: 559a00db0c7920a5247fdff60d4476ad23a9a501
          path: .ci-sources/Maliev.MessagingContracts
          persist-credentials: false
      - name: Checkout exact ServiceDefaults source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MALIEV-Co-Ltd/Maliev.Aspire
          ref: 25a5c3b2d3d6b5ce8ed485d2d44a28f4dc4c9b51
          path: .ci-sources/Maliev.Aspire
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Build exact dependency packages
        run: bash scripts/prepare-material-ci-packages.sh
      - name: Upload exact dependency packages
        id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: material-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages/*
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 1

  build-and-test:
    name: Release build, test, and dependency audit
    needs: dependency-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Download exact dependency packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: material-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages
      - name: Verify dependency artifact integrity
        shell: bash
        env:
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.dependency-packages.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_ARTIFACT_DIGEST"
          (cd .ci-packages && sha256sum --check SHA256SUMS)
      - name: Restore exact package graph
        run: >-
          dotnet restore Maliev.MaterialService.slnx
          --configfile NuGet.PRValidation.Config
          -p:GITHUB_ACTIONS=true
          -p:SharedLibraryVersion=${{ env.SHARED_LIBRARY_VERSION }}
          -p:ServiceDefaultsVersion=${{ env.SERVICE_DEFAULTS_VERSION }}
      - name: Record resolved package graph
        run: dotnet list Maliev.MaterialService.slnx package --include-transitive --no-restore
      - name: Build
        run: >-
          dotnet build Maliev.MaterialService.slnx
          --configuration Release --no-restore
          -p:GITHUB_ACTIONS=true
          -p:SharedLibraryVersion=${{ env.SHARED_LIBRARY_VERSION }}
          -p:ServiceDefaultsVersion=${{ env.SERVICE_DEFAULTS_VERSION }}
      - name: Test
        run: >-
          dotnet test Maliev.MaterialService.slnx
          --configuration Release --no-build --no-restore --verbosity normal
          -p:GITHUB_ACTIONS=true
          -p:SharedLibraryVersion=${{ env.SHARED_LIBRARY_VERSION }}
          -p:ServiceDefaultsVersion=${{ env.SERVICE_DEFAULTS_VERSION }}
      - name: Audit resolved NuGet graph
        run: dotnet list Maliev.MaterialService.slnx package --include-transitive --vulnerable --no-restore --configfile NuGet.PRValidation.Config

  container:
    name: Build and scan production image
    needs: dependency-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_TAG: maliev-material-service:validation-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download exact dependency packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: material-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages
      - name: Verify dependency artifact integrity
        run: test -n "${{ needs.dependency-packages.outputs.artifact-digest }}" && (cd .ci-packages && sha256sum --check SHA256SUMS)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build local production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Maliev.MaterialService.Api/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            dependency_restore_stage=restore-local
            SHARED_LIBRARY_VERSION=${{ env.SHARED_LIBRARY_VERSION }}
            SERVICE_DEFAULTS_VERSION=${{ env.SERVICE_DEFAULTS_VERSION }}
      - name: Validate runtime image metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(docker image inspect "$IMAGE_TAG")"
          test "$(jq -r '.[0].Config.User' <<< "$metadata")" = "app"
          test "$(jq -c '.[0].Config.Entrypoint' <<< "$metadata")" = '["dotnet","Maliev.MaterialService.Api.dll"]'
          test "$(jq -r '.[0].Config.ExposedPorts | has("8080/tcp")' <<< "$metadata")" = "true"
      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          image-ref: ${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: trivy-sbom.cdx.json
          scanners: vuln
          exit-code: "0"
      - name: Validate SBOM output
        run: test -s trivy-sbom.cdx.json
      - name: Scan image for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          image-ref: ${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  validate:
    needs: [dependency-packages, build-and-test, container]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all validation gates passed
        run: echo "All MaterialService validation gates passed."
